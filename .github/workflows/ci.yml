name: CI
on:
  push:
    branches: [main, dev/phoenix-lite]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install aarch64 cross toolchain
        run: sudo apt-get install -y gcc-aarch64-linux-gnu binutils-aarch64-linux-gnu

      - name: Install Rust toolchain (pinned via rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.1"
          targets: aarch64-unknown-none
          components: rustfmt, clippy

      - name: Build debug (aarch64 sovereign target)
        run: |
          cargo build --target aarch64-unknown-none \
            -p aixos-kernel -p aixos-identity \
            -p aixos-shell -p aixos-net -p aixos-init \
            -p aixos-input -p aixos-gpu

      - name: Build release (aarch64 sovereign target — verifies PE layout)
        run: |
          cargo build --release --target aarch64-unknown-none \
            -p aixos-init

      - name: Test (host target)
        run: |
          cargo test --target x86_64-unknown-linux-gnu \
            --lib \
            -p aixos-kernel -p aixos-identity \
            -p aixos-shell -p aixos-net -p aixos-init \
            -p aixos-input -p aixos-gpu

      - name: Clippy (no-deps, aixos crates only)
        run: |
          cargo clippy --target aarch64-unknown-none \
            --no-deps --lib \
            -p aixos-kernel -p aixos-identity \
            -p aixos-shell -p aixos-net -p aixos-init \
            -p aixos-input \
            -- -D warnings

  post-doctrine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check 1 — Attribution scrub
        run: |
          if grep -r "claude\|gemini\|chatgpt\|deepseek\|openai" \
            crates/ --include="*.rs" -i -l; then
            echo "FAIL: AI model name found in source"
            exit 1
          fi
          echo "PASS: No AI model names found"

      - name: Check 5 — Copyright header
        run: |
          fail=0
          for f in $(find crates/ -name "*.rs"); do
            if ! grep -q "Edison Lepiten" "$f"; then
              echo "MISSING copyright: $f"
              fail=1
            fi
          done
          if [ $fail -eq 1 ]; then exit 1; fi
          echo "PASS: All .rs files have copyright header"
